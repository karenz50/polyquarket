<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Polyquarket</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- ── Header ──────────────────────────────────────────────────────── -->
  <header id="main-header">
    <div class="header-brand" onclick="showView('markets')">
      <img src="logo.png" alt="Polyquarket" class="header-logo">
      <span>Polyquarket</span>
    </div>

    <nav class="header-nav">
      <button class="nav-link" data-view="markets">Markets</button>
      <button class="nav-link" data-view="explore">Explore</button>
      <button class="nav-link" data-view="portfolio">Portfolio</button>
      <button class="nav-link" data-view="admin" id="nav-admin" style="display:none">Admin</button>
    </nav>

    <div class="header-right">
      <div class="balance-chip">
        <span class="balance-label">Balance</span>
        <span class="balance-val" id="header-balance">$0.00</span>
      </div>

      <div class="user-chip">
        <div class="user-avatar" id="user-avatar">?</div>
        <div class="user-info">
          <span class="user-name" id="header-username">—</span>
          <span class="user-role" id="header-role">—</span>
        </div>
      </div>

      <button id="logout-btn">Sign out</button>
    </div>
  </header>

  <!-- ── Views ───────────────────────────────────────────────────────── -->
  <div id="view-loading"   class="view active"><div class="loading-wrap"><div class="loading-spinner"></div><p>Connecting…</p></div></div>
  <div id="view-login"     class="view"></div>
  <div id="view-markets"   class="view"></div>
  <div id="view-explore"   class="view"></div>
  <div id="view-portfolio" class="view"></div>
  <div id="view-admin"     class="view"></div>

  <!-- ── Market Modal ────────────────────────────────────────────────── -->
  <div id="market-modal">
    <div id="modal-content"></div>
  </div>

  <!-- ── Toast ───────────────────────────────────────────────────────── -->
  <div id="toast-wrap"></div>

  <script src="https://www.gstatic.com/firebasejs/10.14.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.0/firebase-database-compat.js"></script>
  <script src="firebase-config.js"></script>
  <script src="script.js"></script>
</body>
</html>
